<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVE Wallet Lens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@200;300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #040d14;
    --bg2: #071624;
    --bg3: #0a1e30;
    --border: #0e3a5a;
    --border2: #1a5c8a;
    --accent: #00d4ff;
    --accent2: #0099cc;
    --accent3: #00ff99;
    --text: #c8e8f8;
    --text2: #6a9ab8;
    --text3: #3a6a88;
    --danger: #ff4466;
    --warn: #ffaa00;
    --gold: #f0c040;
    --panel: rgba(7,22,36,0.95);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,180,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(0,80,140,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  #app { position: relative; z-index: 2; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(4,13,20,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    position: relative;
  }

  .logo-icon svg { width: 100%; height: 100%; }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 2px;
    margin-top: -4px;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
    transition: all 0.3s;
  }

  .status-dot.online { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }

  /* ── MAIN ── */
  main { max-width: 1400px; margin: 0 auto; padding: 2rem; }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    min-height: calc(100vh - 64px);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2rem;
    text-align: center;
  }
  #login-screen.visible { display: flex; }

  .login-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3rem;
    max-width: 480px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .login-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
  }

  .login-desc {
    color: var(--text2);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .wallet-type-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .wallet-type-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text2);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    text-align: center;
  }

  .wallet-type-btn:hover, .wallet-type-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.05);
  }

  .wallet-type-icon { font-size: 24px; display: block; margin-bottom: 6px; }

  .btn-primary {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-primary:hover::before { opacity: 0.08; }
  .btn-primary:active { transform: scale(0.99); }

  .btn-primary:disabled {
    border-color: var(--border2);
    color: var(--text3);
    cursor: not-allowed;
  }

  .client-id-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    width: 100%;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .client-id-input:focus { border-color: var(--accent2); }
  .client-id-input::placeholder { color: var(--text3); }

  .input-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
    text-align: left;
  }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }

  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .char-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .char-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--accent);
    overflow: hidden;
  }

  .char-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .char-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  .char-corp {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
  }

  .dash-actions {
    display: flex;
    gap: 8px;
  }

  .btn-sm {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.06); }

  /* ── STAT CARDS ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: 0.4;
  }

  .stat-card:hover { border-color: var(--border2); }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }

  .stat-unit {
    font-size: 12px;
    color: var(--text3);
    margin-left: 4px;
  }

  .stat-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── PANELS ── */
  .panel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 900px) { .panel-grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .panel-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text2);
    text-transform: uppercase;
  }

  .panel-body { padding: 1.25rem; }

  .chart-wrap { position: relative; width: 100%; height: 260px; }

  /* ── TABLE ── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .data-table th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(14,58,90,0.4);
    color: var(--text);
    vertical-align: middle;
  }

  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(0,212,255,0.03); }

  .data-table td.num {
    font-family: 'Share Tech Mono', monospace;
    text-align: right;
    color: var(--accent);
    font-size: 12px;
  }

  .data-table td.rank {
    font-family: 'Share Tech Mono', monospace;
    color: var(--text3);
    font-size: 11px;
  }

  .bar-cell { min-width: 80px; }

  .mini-bar {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }

  .mini-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  /* ── TABS ── */
  .tab-bar {
    display: flex;
    gap: 4px;
    padding: 0 1.25rem;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .tab {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text3);
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── TAG ── */
  .tag {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 2px;
    border: 1px solid var(--border2);
    color: var(--text3);
    text-transform: uppercase;
  }

  .tag.bounty { border-color: #1a5c8a; color: #5ba8d8; }
  .tag.mission { border-color: #1a5a2a; color: #5bc87a; }
  .tag.bonus { border-color: #5a4a0a; color: #c8a840; }
  .tag.other { border-color: #3a1a3a; color: #a870a8; }

  /* ── LOADING ── */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4,13,20,0.9);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }

  .loader-ring {
    width: 48px;
    height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 2px;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 12px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text);
    z-index: 300;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { border-color: var(--danger); color: var(--danger); }
  #toast.success { border-color: var(--accent3); color: var(--accent3); }

  /* ── PERIOD FILTER ── */
  .period-bar {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .period-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .period-btn:hover, .period-btn.active {
    border-color: var(--accent2);
    color: var(--accent);
  }

  /* ── FULL TABLE PANEL ── */
  .full-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .table-scroll { overflow-x: auto; max-height: 500px; overflow-y: auto; }

  .table-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
  .table-scroll::-webkit-scrollbar-track { background: var(--bg); }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .divider {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin: 1.5rem 0 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--text3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="scanline"></div>
<div id="app">

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 32 32" fill="none">
        <polygon points="16,2 30,26 2,26" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
        <polygon points="16,8 26,24 6,24" fill="rgba(0,212,255,0.06)" stroke="#0099cc" stroke-width="0.5"/>
        <circle cx="16" cy="18" r="3" fill="#00d4ff" opacity="0.8"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Wallet Lens</div>
      <div class="logo-sub">EVE Online · ISK Tracker</div>
    </div>
  </div>
  <div class="header-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">OFFLINE</span>
  </div>
</header>

<!-- 로딩 -->
<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-text" id="loading-text">CONNECTING...</div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<main id="app-main">

  <!-- 로그인 화면 -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-title">EVE WALLET LENS</div>
      <div class="login-desc">EVE SSO로 로그인하면 지갑 데이터를 분석할 수 있어요.<br>데이터는 브라우저에서만 처리되며 서버에 저장되지 않습니다.</div>

      <div class="wallet-type-selector">
        <div class="wallet-type-btn active" id="btn-personal" onclick="selectWalletType('personal')">
          <span class="wallet-type-icon">👤</span>
          개인 지갑
        </div>
        <div class="wallet-type-btn" id="btn-corp" onclick="selectWalletType('corp')">
          <span class="wallet-type-icon">🏢</span>
          콥 지갑
        </div>
      </div>

      <button class="btn-primary" id="login-btn" onclick="startLogin()">
        EVE SSO 로그인
      </button>

      <div style="margin-top: 1rem; font-size: 11px; color: var(--text3); line-height: 1.6;">
        콥 지갑은 Accountant 권한이 필요합니다.
      </div>
    </div>
  </div>

  <!-- 대시보드 -->
  <div id="dashboard">
    <div class="dash-header">
      <div class="char-info">
        <div class="char-avatar" id="char-avatar"></div>
        <div>
          <div class="char-name" id="char-name">—</div>
          <div class="char-corp" id="char-corp">—</div>
        </div>
      </div>
      <div class="dash-actions">
        <div class="period-bar">
          <button class="period-btn active" onclick="setPeriod(7)">7D</button>
          <button class="period-btn" onclick="setPeriod(14)">14D</button>
          <button class="period-btn" onclick="setPeriod(30)">30D</button>
          <button class="period-btn" onclick="setPeriod(0)">ALL</button>
        </div>
        <button class="btn-sm" onclick="exportCSV()">CSV 저장</button>
        <button class="btn-sm" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <!-- 요약 카드 -->
    <div class="stat-grid" id="stat-grid"></div>

    <!-- 탭 -->
    <div class="full-panel">
      <div class="tab-bar">
        <button class="tab active" onclick="switchTab('overview')">개요</button>
        <button class="tab" onclick="switchTab('chars')">캐릭터별</button>
        <button class="tab" onclick="switchTab('journal')">전체 내역</button>
      </div>

      <!-- 개요 탭 -->
      <div id="tab-overview">
        <div style="padding: 1.25rem;">
          <div class="panel-grid">
            <div>
              <div class="panel-title" style="margin-bottom: 12px;">소득 유형별 세금</div>
              <div class="chart-wrap"><canvas id="chart-type" role="img" aria-label="소득 유형별 세금 차트"></canvas></div>
            </div>
            <div>
              <div class="panel-title" style="margin-bottom: 12px;">일별 세금 추이</div>
              <div class="chart-wrap"><canvas id="chart-trend" role="img" aria-label="일별 세금 추이 차트"></canvas></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 캐릭터별 탭 -->
      <div id="tab-chars" style="display:none;">
        <div style="padding: 1.25rem 1.25rem 0;">
          <div class="chart-wrap" style="height: 220px; margin-bottom: 1rem;">
            <canvas id="chart-chars" role="img" aria-label="캐릭터별 세금 납부액 차트"></canvas>
          </div>
        </div>
        <div class="table-scroll">
          <table class="data-table" id="table-chars"></table>
        </div>
      </div>

      <!-- 전체 내역 탭 -->
      <div id="tab-journal" style="display:none;">
        <div style="padding: 12px 1.25rem; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
          <input class="client-id-input" id="journal-search" style="margin:0; width: 220px; padding: 7px 12px;" placeholder="캐릭터명 또는 유형 검색...">
          <select id="journal-filter" class="client-id-input" style="margin:0; width: 180px; padding: 7px 12px;">
            <option value="">전체 유형</option>
          </select>
        </div>
        <div class="table-scroll">
          <table class="data-table" id="table-journal"></table>
        </div>
      </div>
    </div>
  </div>

</main>
</div>

<script>
const CLIENT_ID = 'cdadeb67014b4a908d2508028b922448';
const TOKEN_STORAGE = 'eve_wallet_token';
const DATA_STORAGE = 'eve_wallet_data';
const ESI = 'https://esi.evetech.net/latest';
const SSO_AUTH = 'https://login.eveonline.com/v2/oauth/authorize';
const SSO_TOKEN = 'https://login.eveonline.com/v2/oauth/token';
const SSO_VERIFY = 'https://login.eveonline.com/oauth/verify';
const CALLBACK = location.origin + location.pathname;

let walletType = 'personal';
let allEntries = [];
let charInfo = null;
let corpId = null;
let currentPeriod = 7;
let charts = {};

function selectWalletType(type) {
  walletType = type;
  document.getElementById('btn-personal').classList.toggle('active', type === 'personal');
  document.getElementById('btn-corp').classList.toggle('active', type === 'corp');
}

function getScopes() {
  return walletType === 'corp'
    ? 'esi-wallet.read_corporation_wallets.v1'
    : 'esi-wallet.read_character_wallet.v1';
}

async function startLogin() {
  localStorage.setItem('eve_wallet_type', walletType);

  const verifier = generateVerifier();
  const challenge = await generateChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);

  const params = new URLSearchParams({
    response_type: 'code',
    redirect_uri: CALLBACK,
    client_id: CLIENT_ID,
    scope: getScopes(),
    state: 'evewallet',
    code_challenge: challenge,
    code_challenge_method: 'S256'
  });

  location.href = SSO_AUTH + '?' + params.toString();
}

function generateVerifier() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function generateChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function handleCallback() {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (!code) return false;

  history.replaceState({}, '', location.pathname);

  const clientId = CLIENT_ID;
  const verifier = sessionStorage.getItem('pkce_verifier');
  walletType = localStorage.getItem('eve_wallet_type') || 'personal';

  showLoading('토큰 발급 중...');
  try {
    const res = await fetch(SSO_TOKEN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code,
        redirect_uri: CALLBACK,
        client_id: clientId,
        code_verifier: verifier
      })
    });
    const token = await res.json();
    if (!res.ok) throw new Error(token.error_description || '토큰 발급 실패');
    localStorage.setItem(TOKEN_STORAGE, JSON.stringify(token));
    return true;
  } catch(e) {
    showToast(e.message, 'error');
    hideLoading();
    return false;
  }
}

async function loadData() {
  const tokenData = JSON.parse(localStorage.getItem(TOKEN_STORAGE) || 'null');
  if (!tokenData) return false;

  const accessToken = tokenData.access_token;

  showLoading('캐릭터 정보 조회 중...');
  try {
    const verify = await fetch(SSO_VERIFY, { headers: { Authorization: `Bearer ${accessToken}` } });
    charInfo = await verify.json();
    if (!charInfo.CharacterID) throw new Error('캐릭터 정보 조회 실패');
  } catch(e) {
    showToast('인증 만료. 다시 로그인하세요.', 'error');
    hideLoading();
    return false;
  }

  const existing = JSON.parse(localStorage.getItem(DATA_STORAGE) || '[]');
  const existingIds = new Set(existing.map(e => e.id));
  let newEntries = [];

  if (walletType === 'corp') {
    showLoading('콥 정보 조회 중...');
    const corpRes = await fetch(`${ESI}/characters/${charInfo.CharacterID}/`, { headers: { Authorization: `Bearer ${tokenData.access_token}` } });
    const corpData = await corpRes.json();
    corpId = corpData.corporation_id;

    for (let div = 1; div <= 7; div++) {
      showLoading(`콥 지갑 Division ${div}/7 수집 중...`);
      const entries = await fetchAllPages(`${ESI}/corporations/${corpId}/wallets/${div}/journal/`, tokenData.access_token);
      entries.forEach(e => { e.division = div; e.wallet_type = 'corp'; });
      newEntries.push(...entries);
    }
  } else {
    showLoading('개인 지갑 수집 중...');
    const entries = await fetchAllPages(`${ESI}/characters/${charInfo.CharacterID}/wallet/journal/`, tokenData.access_token);
    entries.forEach(e => { e.wallet_type = 'personal'; });
    newEntries.push(...entries);
  }

  let added = 0;
  newEntries.forEach(e => {
    if (!existingIds.has(e.id)) { existing.push(e); added++; }
  });

  localStorage.setItem(DATA_STORAGE, JSON.stringify(existing));
  allEntries = existing;
  showToast(`${added}건 신규 추가 (총 ${existing.length}건)`, 'success');
  return true;
}

async function fetchAllPages(url, token) {
  const all = [];
  let page = 1;
  while (true) {
    const res = await fetch(`${url}?page=${page}`, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) break;
    const data = await res.json();
    if (!data.length) break;
    all.push(...data);
    const total = parseInt(res.headers.get('X-Pages') || '1');
    if (page >= total) break;
    page++;
  }
  return all;
}

function filterByPeriod(entries, days) {
  if (!days) return entries;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return entries.filter(e => new Date(e.date) >= cutoff);
}

function parseChar(desc, ref) {
  if (!desc) return null;
  if (ref === 'bounty_prizes' && desc.includes(' got bounty prizes')) return desc.split(' got bounty prizes')[0];
  if (ref === 'agent_mission_reward' && desc.includes(' got reward from')) return desc.split(' got reward from')[0];
  if (ref === 'agent_mission_time_bonus_reward' && desc.includes(' got time bonus reward from')) return desc.split(' got time bonus reward from')[0];
  return null;
}

function fmtISK(v) {
  if (v >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(1) + 'K';
  return Math.round(v).toLocaleString();
}

function refTag(ref) {
  const map = {
    bounty_prizes: ['bounty', 'BOUNTY'],
    agent_mission_reward: ['mission', 'MISSION'],
    agent_mission_time_bonus_reward: ['bonus', 'BONUS'],
    daily_goal_payouts: ['other', 'DAILY GOAL'],
    player_donation: ['other', 'DONATION'],
    market_transaction: ['other', 'MARKET'],
    industry_job_tax: ['other', 'INDUSTRY'],
  };
  const [cls, label] = map[ref] || ['other', ref.replace(/_/g, ' ').toUpperCase()];
  return `<span class="tag ${cls}">${label}</span>`;
}

function renderDashboard() {
  const filtered = filterByPeriod(allEntries, currentPeriod);

  // 세금 집계
  const taxEntries = filtered.filter(e => parseFloat(e.tax||0) > 0);
  const totalTax = taxEntries.reduce((s,e) => s + parseFloat(e.tax||0), 0);
  const totalAmount = filtered.reduce((s,e) => s + Math.abs(parseFloat(e.amount||0)), 0);

  // 캐릭터별
  const charTax = {};
  taxEntries.forEach(e => {
    const char = parseChar(e.description, e.ref_type) || (walletType === 'personal' ? charInfo.CharacterName : '기타');
    charTax[char] = (charTax[char] || 0) + parseFloat(e.tax||0);
  });
  const sortedChars = Object.entries(charTax).sort((a,b) => b[1]-a[1]);

  // 유형별
  const typeTax = {};
  taxEntries.forEach(e => {
    const t = e.ref_type || '기타';
    typeTax[t] = (typeTax[t] || 0) + parseFloat(e.tax||0);
  });

  // 날짜별
  const dateTax = {};
  taxEntries.forEach(e => {
    const d = e.date.slice(0,10);
    dateTax[d] = (dateTax[d] || 0) + parseFloat(e.tax||0);
  });
  const dates = Object.keys(dateTax).sort();

  // stat cards
  const sg = document.getElementById('stat-grid');
  sg.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">총 ISK 수입</div>
      <div class="stat-value">${fmtISK(totalTax)}<span class="stat-unit">ISK</span></div>
      <div class="stat-sub">${taxEntries.length}건</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">활동 캐릭터</div>
      <div class="stat-value">${sortedChars.length}<span class="stat-unit">명</span></div>
      <div class="stat-sub">${walletType === 'corp' ? '콥 지갑' : '개인 지갑'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">최고 수입</div>
      <div class="stat-value" style="font-size:16px; padding-top:5px;">${sortedChars[0]?.[0] || '—'}</div>
      <div class="stat-sub">${sortedChars[0] ? fmtISK(sortedChars[0][1]) + ' ISK' : ''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">활성 기간</div>
      <div class="stat-value" style="font-size:16px; padding-top:5px;">${dates[0]||'—'}</div>
      <div class="stat-sub">~ ${dates[dates.length-1]||'—'}</div>
    </div>
  `;

  // 차트 - 유형별
  const typeLabels = Object.keys(typeTax);
  const typeVals = Object.values(typeTax).map(v => Math.round(v/1e6*100)/100);
  const typeColors = ['#00d4ff','#00ff99','#ffaa00','#ff4488','#aa88ff','#44ccff','#88ffcc'];
  destroyChart('chart-type');
  charts['chart-type'] = new Chart(document.getElementById('chart-type'), {
    type: 'doughnut',
    data: {
      labels: typeLabels.map(l => l.replace(/_/g,' ')),
      datasets: [{ data: typeVals, backgroundColor: typeColors, borderWidth: 1, borderColor: '#071624' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '60%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed.toFixed(2)}M ISK` } }
      }
    }
  });

  // 차트 - 일별 추이
  destroyChart('chart-trend');
  charts['chart-trend'] = new Chart(document.getElementById('chart-trend'), {
    type: 'line',
    data: {
      labels: dates,
      datasets: [{
        label: '세금 (M ISK)',
        data: dates.map(d => Math.round(dateTax[d]/1e4)/100),
        borderColor: '#00d4ff',
        backgroundColor: 'rgba(0,212,255,0.06)',
        borderWidth: 2,
        pointRadius: 3,
        pointBackgroundColor: '#00d4ff',
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#3a6a88', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'rgba(14,58,90,0.3)' } },
        y: { ticks: { color: '#3a6a88', font: { size: 10 }, callback: v => v+'M' }, grid: { color: 'rgba(14,58,90,0.3)' } }
      }
    }
  });

  // 캐릭터별 차트
  const top10 = sortedChars.slice(0, 10);
  const charColors = ['#00d4ff','#00ff99','#ffaa00','#ff4488','#aa88ff','#44ccff','#88ffcc','#ffcc44','#ff8844','#cc44ff'];
  destroyChart('chart-chars');
  charts['chart-chars'] = new Chart(document.getElementById('chart-chars'), {
    type: 'bar',
    data: {
      labels: top10.map(([c]) => c),
      datasets: [{
        data: top10.map(([,v]) => Math.round(v/1e4)/100),
        backgroundColor: charColors,
        borderRadius: 2,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#3a6a88', font: { size: 10 }, callback: v => v+'M' }, grid: { color: 'rgba(14,58,90,0.3)' } },
        y: { ticks: { color: '#6a9ab8', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });

  // 캐릭터 테이블
  const maxTax = sortedChars[0]?.[1] || 1;
  const tc = document.getElementById('table-chars');
  tc.innerHTML = `<thead><tr>
    <th>#</th><th>캐릭터</th><th style="text-align:right">ISK 수입</th><th style="text-align:right">비중</th><th>비율</th>
  </tr></thead><tbody>${sortedChars.map(([char, tax], i) => `
    <tr>
      <td class="rank">${i+1}</td>
      <td>${char}</td>
      <td class="num">${fmtISK(tax)} ISK</td>
      <td class="num">${(tax/totalTax*100).toFixed(1)}%</td>
      <td class="bar-cell"><div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.round(tax/maxTax*100)}%"></div></div></td>
    </tr>`).join('')}</tbody>`;

  // 전체 내역 테이블 + 필터
  renderJournal(filtered);

  // 유형 필터 옵션
  const sel = document.getElementById('journal-filter');
  const types = [...new Set(filtered.map(e => e.ref_type).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">전체 유형</option>' + types.map(t => `<option value="${t}">${t.replace(/_/g,' ')}</option>`).join('');
}

function renderJournal(entries) {
  const search = document.getElementById('journal-search').value.toLowerCase();
  const filterType = document.getElementById('journal-filter').value;

  let rows = [...entries].reverse();
  if (search) rows = rows.filter(e => (e.description||'').toLowerCase().includes(search) || (e.ref_type||'').includes(search));
  if (filterType) rows = rows.filter(e => e.ref_type === filterType);

  const tj = document.getElementById('table-journal');
  if (!rows.length) {
    tj.innerHTML = '<tbody><tr><td colspan="6" class="empty">데이터 없음</td></tr></tbody>';
    return;
  }
  tj.innerHTML = `<thead><tr>
    <th>날짜</th><th>유형</th><th>설명</th><th style="text-align:right">금액</th><th style="text-align:right">세금</th><th style="text-align:right">잔액</th>
  </tr></thead><tbody>${rows.slice(0,500).map(e => `
    <tr>
      <td style="font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text3); white-space:nowrap">${e.date.slice(0,10)}</td>
      <td>${refTag(e.ref_type)}</td>
      <td style="color:var(--text2); max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px">${e.description||'—'}</td>
      <td class="num" style="color:${parseFloat(e.amount||0)>=0?'var(--accent3)':'var(--danger)'}">${parseFloat(e.amount||0)>=0?'+':''}${fmtISK(Math.abs(parseFloat(e.amount||0)))}</td>
      <td class="num" style="color:${parseFloat(e.tax||0)>0?'var(--gold)':'var(--text3)'}">${parseFloat(e.tax||0)>0?fmtISK(parseFloat(e.tax||0)):'-'}</td>
      <td class="num" style="color:var(--text2)">${fmtISK(Math.abs(parseFloat(e.balance||0)))}</td>
    </tr>`).join('')}
  ${rows.length > 500 ? `<tr><td colspan="6" class="empty">상위 500건 표시 중 (전체 ${rows.length}건)</td></tr>` : ''}
  </tbody>`;
}

function switchTab(tab) {
  ['overview','chars','journal'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
    document.querySelectorAll('.tab')[['overview','chars','journal'].indexOf(t)].classList.toggle('active', t === tab);
  });
}

function setPeriod(days) {
  currentPeriod = days;
  document.querySelectorAll('.period-btn').forEach((btn, i) => {
    btn.classList.toggle('active', [7,14,30,0][i] === days);
  });
  renderDashboard();
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function exportCSV() {
  const filtered = filterByPeriod(allEntries, currentPeriod);
  if (!filtered.length) { showToast('데이터 없음', 'error'); return; }
  const keys = [...new Set(filtered.flatMap(e => Object.keys(e)))];
  const csv = [keys.join(','), ...filtered.map(e => keys.map(k => JSON.stringify(e[k]??'')).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `eve_wallet_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('CSV 저장 완료', 'success');
}

function logout() {
  localStorage.removeItem(TOKEN_STORAGE);
  localStorage.removeItem(DATA_STORAGE);
  document.getElementById('login-screen').classList.add('visible');
  document.getElementById('dashboard').style.display = 'none';
  setStatus(false);
}

function showLoading(msg) {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-text').textContent = msg || 'LOADING...';
}

function hideLoading() { document.getElementById('loading').style.display = 'none'; }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => { t.className = ''; }, 3000);
}

function setStatus(online) {
  document.getElementById('status-dot').className = 'status-dot' + (online ? ' online' : '');
  document.getElementById('status-text').textContent = online ? 'ONLINE' : 'OFFLINE';
}

document.getElementById('journal-search').addEventListener('input', () => renderJournal(filterByPeriod(allEntries, currentPeriod)));
document.getElementById('journal-filter').addEventListener('change', () => renderJournal(filterByPeriod(allEntries, currentPeriod)));

async function init() {
  document.getElementById('login-screen').classList.add('visible');
  const params = new URLSearchParams(location.search);
  const code = params.get('code');

  if (code) {
    showLoading('인증 처리 중...');
    const ok = await handleCallback();
    if (!ok) { hideLoading(); return; }
  }

  const tokenData = JSON.parse(localStorage.getItem(TOKEN_STORAGE) || 'null');
  if (!tokenData) {
    document.getElementById('login-screen').classList.add('visible');
    hideLoading();
    return;
  }

  walletType = localStorage.getItem('eve_wallet_type') || 'personal';
  showLoading('데이터 로딩 중...');
  const ok = await loadData();
  if (!ok) {
    document.getElementById('login-screen').classList.add('visible');
    hideLoading();
    return;
  }

  const name = charInfo.CharacterName;
  document.getElementById('char-name').textContent = name;
  document.getElementById('char-corp').textContent = walletType === 'corp' ? `CORP ID: ${corpId}` : 'PERSONAL WALLET';

  const av = document.getElementById('char-avatar');
  const img = document.createElement('img');
  img.src = `https://images.evetech.net/characters/${charInfo.CharacterID}/portrait?size=64`;
  img.onerror = () => { av.textContent = name.slice(0,2).toUpperCase(); };
  av.appendChild(img);

  document.getElementById('login-screen').classList.remove('visible');
  document.getElementById('dashboard').style.display = 'block';
  setStatus(true);
  renderDashboard();
  hideLoading();
}

init();
</script>
</body>
</html>
